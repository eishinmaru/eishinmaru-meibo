<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>栄真丸 乗船名簿</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 0;
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
    background: #fff;
    color: #222;
    line-height: 1.6;
  }
  .container {
    max-width: 600px;
    margin: 0 auto;
    padding: 16px;
  }
  header {
    text-align: center;
    padding: 16px 0;
    border-bottom: 2px solid #003366;
    margin-bottom: 20px;
  }
  header h1 {
    margin: 0;
    color: #003366;
    font-size: 22px;
  }
  header .sub {
    color: #666;
    font-size: 13px;
    margin-top: 4px;
  }
  .page { display: none; }
  .page.active { display: block; }
  .btn {
    display: block;
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
  }
  .btn-primary { background: #003366; color: #fff; }
  .btn-primary:hover { background: #00509e; }
  .btn-secondary { background: #f0f0f0; color: #333; border: 1px solid #ccc; }
  .btn-secondary:hover { background: #e0e0e0; }
  .btn-back {
    background: transparent;
    color: #003366;
    text-decoration: underline;
    width: auto;
    padding: 8px 0;
    font-size: 14px;
  }
  label {
    display: block;
    margin: 12px 0 4px;
    font-weight: bold;
    font-size: 14px;
    color: #333;
  }
  label .req { color: #c00; margin-left: 4px; }
  input[type="text"], input[type="tel"], input[type="number"], input[type="date"], select {
    width: 100%;
    padding: 10px;
    border: 1px solid #bbb;
    border-radius: 4px;
    font-size: 16px;
    background: #fff;
  }
  .radio-group { display: flex; gap: 16px; margin-top: 6px; }
  .radio-group label {
    margin: 0; font-weight: normal; font-size: 15px; cursor: pointer;
  }
  .info-box {
    background: #f4f8fc;
    border-left: 4px solid #003366;
    padding: 12px;
    margin: 16px 0;
    font-size: 14px;
    border-radius: 4px;
  }
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    color: #fff;
    padding: 12px 24px;
    border-radius: 24px;
    font-size: 14px;
    z-index: 9999;
    display: none;
  }
  .footer-note {
    text-align: center;
    color: #999;
    font-size: 12px;
    padding: 20px 0;
    margin-top: 30px;
    border-top: 1px solid #eee;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>栄真丸 乗船名簿</h1>
    <div class="sub">ご乗船前に必ずご記入ください</div>
  </header>

  <section id="page-start" class="page active">
    <p style="text-align:center; font-size:15px; color:#444;">
      会員番号をお持ちですか？
    </p>
    <button class="btn btn-primary" onclick="goPage('member')">会員番号あり</button>
    <button class="btn btn-secondary" onclick="goPage('nomember-choice')">会員番号なし</button>
  </section>

  <section id="page-nomember-choice" class="page">
    <p style="text-align:center;">会員登録なさいますか？</p>
    <button class="btn btn-primary" onclick="goRegister()">登録する</button>
    <button class="btn btn-secondary" onclick="goPage('nomember-form')">登録しない（今回のみ）</button>
    <button class="btn btn-back" onclick="goPage('start')">← 戻る</button>
  </section>

  <section id="page-member" class="page">
    <h3>会員乗船登録</h3>
    <label>会員番号<span class="req">*</span></label>
    <input type="tel" id="m-no" placeholder="例: 501" inputmode="numeric" autocomplete="off">
    <div id="trip-section-member"></div>
    <button class="btn btn-primary" onclick="submitMember()">送信する</button>
    <button class="btn btn-back" onclick="goPage('start')">← 戻る</button>
  </section>

  <section id="page-nomember-form" class="page">
    <h3>非会員乗船登録</h3>
    <label>お名前<span class="req">*</span></label>
    <input type="text" id="n-name" placeholder="例: 山田 太郎" autocomplete="name">
    <label>フリガナ<span class="req">*</span></label>
    <input type="text" id="n-furigana" placeholder="例: ヤマダ タロウ" autocomplete="off">
    <label>性別<span class="req">*</span></label>
    <div class="radio-group">
      <label><input type="radio" name="n-gender" value="男性"> 男性</label>
      <label><input type="radio" name="n-gender" value="女性"> 女性</label>
    </div>
    <label>電話番号<span class="req">*</span></label>
    <input type="tel" id="n-phone" placeholder="例: 09012345678" autocomplete="tel" inputmode="numeric">
    <label>緊急連絡先</label>
    <input type="tel" id="n-emergency" placeholder="ご家族等の連絡先" autocomplete="off" inputmode="numeric">
    <label>住所</label>
    <input type="text" id="n-address" placeholder="例: 大阪府大阪市…" autocomplete="street-address">
    <div id="trip-section-nomember"></div>
    <button class="btn btn-primary" onclick="submitNoMember()">送信する</button>
    <button class="btn btn-back" onclick="goPage('nomember-choice')">← 戻る</button>
  </section>

  <section id="page-done" class="page">
    <div style="text-align:center; padding:40px 0;">
      <div style="font-size:48px;">✅</div>
      <h2 style="color:#003366;">乗船名簿ご記入完了しました</h2>
      <p>乗船ご案内までしばらくお待ちください。</p>
      <button class="btn btn-secondary" onclick="resetAll()">最初に戻る</button>
    </div>
  </section>

  <div class="footer-note">
    © 栄真丸 / 乗船名簿システム<br>produced by YTS Products
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwDiD_DNoPF0_6fo_dmPm75AJhTjawVjH1stZBFgN-rU5gwy4h7aPWFDIZq5Hx39tkL/exec';
const REGISTER_URL = 'https://eishinmaru.github.io/eishinmaru-reserve/eishinmaru_reserve.html';
const FISHING_OPTIONS = ['貸切','なし','フグ','タイラバ','タコ','ジギング','ノマセ','落とし込み','ティップラン','イカメタル','ドテリグ(ミドルゲーム)','アジ(サビキ)','キス(天秤)','カワハギ','タチウオ','五目','その他便'];

function goPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  var el = document.getElementById('page-' + name);
  if(el) el.classList.add('active');
  if(name === 'member') buildTripSection('trip-section-member');
  if(name === 'nomember-form') buildTripSection('trip-section-nomember');
  window.scrollTo(0,0);
}
function goRegister(){ window.location.href = REGISTER_URL; }
function resetAll(){
  document.querySelectorAll('input').forEach(i=>{ if(i.type==='radio') i.checked=false; else i.value=''; });
  goPage('start');
}
function buildTripSection(targetId){
  var el = document.getElementById(targetId);
  if(!el || el.dataset.built === '1') return;
  el.dataset.built = '1';
  var today = new Date();
  var iso = today.toISOString().slice(0,10);
  var fishOpts = FISHING_OPTIONS.map(f=>'<option value="'+f+'">'+f+'</option>').join('');
  el.innerHTML = '<hr style="margin:20px 0;"><h4>便情報</h4><label>日付<span class="req">*</span></label><input type="date" class="trip-date" value="'+iso+'"><label>午前 / 午後<span class="req">*</span></label><select class="trip-ampm"><option value="午前">午前</option><option value="午後">午後</option></select><label>釣り物<span class="req">*</span></label><select class="trip-fishing">'+fishOpts+'</select>';
}
function getTripData(prefix){
  var section = document.getElementById('page-' + prefix);
  return { date: section.querySelector('.trip-date').value, ampm: section.querySelector('.trip-ampm').value, fishing: section.querySelector('.trip-fishing').value };
}
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(()=>{ t.style.display='none'; }, 2500);
}
function submitMember(){
  var no = document.getElementById('m-no').value.trim();
  if(!no){ showToast('会員番号を入力してください'); return; }
  var trip = getTripData('member');
  if(!trip.date || !trip.ampm || !trip.fishing){ showToast('便情報を入力してください'); return; }
  postToGAS({ type:'member', memberNo:'No.'+no, date:trip.date, ampm:trip.ampm, fishing:trip.fishing });
}
function submitNoMember(){
  var name = document.getElementById('n-name').value.trim();
  var furi = document.getElementById('n-furigana').value.trim();
  var genderEl = document.querySelector('input[name="n-gender"]:checked');
  var phone = document.getElementById('n-phone').value.trim();
  if(!name){ showToast('お名前を入力してください'); return; }
  if(!furi){ showToast('フリガナを入力してください'); return; }
  if(!genderEl){ showToast('性別を選択してください'); return; }
  if(!phone){ showToast('電話番号を入力してください'); return; }
  var trip = getTripData('nomember-form');
  if(!trip.date || !trip.ampm || !trip.fishing){ showToast('便情報を入力してください'); return; }
  postToGAS({ type:'nomember', name:name, furigana:furi, gender:genderEl.value, phone:phone, emergency:document.getElementById('n-emergency').value.trim(), address:document.getElementById('n-address').value.trim(), date:trip.date, ampm:trip.ampm, fishing:trip.fishing });
}
function postToGAS(data){
  var btns = document.querySelectorAll('.btn-primary');
  btns.forEach(b=>{ b.disabled = true; b.style.opacity='0.5'; });
  showToast('送信中...');
  fetch(GAS_URL, { method:'POST', body: JSON.stringify(data) })
    .then(r => r.json())
    .then(res => { if(res.status === 'ok'){ goPage('done'); } else { var btns2 = document.querySelectorAll('.btn-primary'); btns2.forEach(b=>{ b.disabled = false; b.style.opacity='1'; }); showToast('エラー: ' + (res.message || '送信に失敗しました')); } })
    .catch(e => { var btns3 = document.querySelectorAll('.btn-primary'); btns3.forEach(b=>{ b.disabled = false; b.style.opacity='1'; }); showToast('通信エラー: ' + e.message); });
}
</script>
</body>
</html>
